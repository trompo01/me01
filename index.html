<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Libros - Vanina Vergara</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #fff;
  color: #000;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
}
.container { width: 100%; max-width: 720px; margin: 0 auto; }
h1 { font-size: 1.8rem; text-align: center; margin: 24px 0 8px; font-weight: 700; }
h2 { font-size: 1.1rem; text-align: center; margin-bottom: 6px; font-weight: 400; }
h3 { font-size: 1rem; text-align: center; margin-bottom: 24px; font-weight: 400; color: #333; }

.btn-3d {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 18px 28px;
  background: #fff;
  color: #000;
  border: 2px solid #000;
  border-radius: 14px;
  box-shadow: 0 6px 0 #000, 0 8px 16px rgba(0,0,0,0.12);
  font-weight: 700;
  font-size: 1.05rem;
  text-decoration: none;
  text-align: center;
  cursor: pointer;
  user-select: none;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
  margin: 12px;
}
.btn-3d:hover { transform: translateY(-1px); box-shadow: 0 7px 0 #000, 0 10px 18px rgba(0,0,0,0.16); }
.btn-3d:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
.btn-3d.no-click { cursor: default; pointer-events: none; }
.btn-3d img { height: 28px; width: auto; display: block; }
.spark { position: relative; }
.spark:hover::after {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 14px;
  background: linear-gradient(120deg, transparent 40%, rgba(0,0,0,0.08) 50%, transparent 60%);
}

.center { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; width: 100%; }
.row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 32px 0; }

table { width: 100%; border-collapse: collapse; margin: 24px 0; border: 2px solid #000; }
th { background: #000; color: #fff; padding: 14px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px; }
td { border-top: 1px solid #000; padding: 0; }
td a { display: block; padding: 14px 16px; color: #000; text-decoration: none; font-weight: 500; }
td a:hover { background: #f5f5f5; text-decoration: underline; }

.footer { margin-top: auto; padding: 32px 0 16px; display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; width: 100%; }

.flag { font-size: 1.8rem; line-height: 1; }
@media (max-width: 600px) {
  .btn-3d { width: 100%; max-width: 320px; }
  h1 { font-size: 1.5rem; }
}
</style>
</head>
<body>
<div class="container center">
  <div style="margin-top:40px; margin-bottom: 60px;">
    <div class="btn-3d no-click" id="topBtn" style="min-width:280px;">
      <span id="topText">MIS LIBROS EN AMAZON</span>
    </div>
  </div>

  <div class="row">
    <a href="page2.html" class="btn-3d spark">
      <img id="flagEs" src="flag_spain.jpg" alt="ES" style="height:24px;width:36px;object-fit:cover;border:1px solid #000;border-radius:3px;">
      <span>Español</span>
    </a>
    <a href="page3.html" class="btn-3d spark">
      <img id="flagEn" src="flag_usa.jpg" alt="EN" style="height:24px;width:36px;object-fit:cover;border:1px solid #000;border-radius:3px;">
      <span>English</span>
    </a>
  </div>
</div>

<script>
const topPhrases = ["MIS LIBROS EN AMAZON","MY BOOKS ON AMAZON"];
let ti=0; setInterval(()=>{ ti=(ti+1)%2; document.getElementById('topText').textContent=topPhrases[ti]; }, 3000);

const flagsEs = ["flag_spain.jpg","flag_paraguay.jpg","flag_argentina.jpg","flag_uruguay.jpg"];
let fe=0; setInterval(()=>{ fe=(fe+1)%flagsEs.length; document.getElementById('flagEs').src=flagsEs[fe]; }, 1800);

const flagsEn = ["flag_usa.jpg","flag_uk.jpg","flag_australia.jpg"];
let fn=0; setInterval(()=>{ fn=(fn+1)%flagsEn.length; document.getElementById('flagEn').src=flagsEn[fn]; }, 1800);
</script>
</body>
</html>
